services:
  - type: web
    name: the-sea-finance-bot
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: the-sea-finance-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DB_PATH
        value: /data/exhibitledger.db
      - key: DEFAULT_EXHIBITION
        value: CLASH090526
      - key: EXPORT_DIR
        value: /data/exports
      - key: SEED_MMK_TO_THB_RATE
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: the-sea-finance-bot
          property: host
      - key: BACKUP_CHAT_ID
        sync: false
      - key: POLLING
        value: "false"

